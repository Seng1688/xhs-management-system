services:
  postgres:
    image: postgres:17-alpine
    container_name: odin-recruitment-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: minichoper
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres # Matches the service name above
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n # Separate database for n8n
      - DB_POSTGRESDB_USER=postgres # Your existing user
      - DB_POSTGRESDB_PASSWORD=minichoper # Your existing password
    volumes:
      # Remember, n8n still needs local storage for encryption keys!
      - n8n_storage:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy # Waits for your healthcheck to pass first

volumes:
  postgres_data:
    external: true
    # Replace 'repo-a-folder-name_postgres_data' with the actual volume name from 'docker volume ls'
    name: odin-recruitment_postgres_data
  n8n_storage:
    external: true
    name: odin-recruitment_n8n_storage
